<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALUTH EWA - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <div class="login-logo"><i class="fa-solid fa-clapperboard"></i></div>
            <h2>Admin Login</h2>
            <p>Enter password to access panel</p>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="adminPassword" placeholder="Password">
            </div>
            <button id="loginBtn" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        </div>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="admin-nav">
            <div class="admin-logo">
                <i class="fa-solid fa-clapperboard"></i> ALUTH EWA <small>Admin</small>
            </div>
            <button id="logoutBtn" class="btn-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>

        <div class="admin-container">
            <div class="admin-card">
                <h3><i class="fa-solid fa-plus-circle"></i> Add New Movie</h3>
                <form id="addMovieForm">
                    <div class="form-group">
                        <label><i class="fa-solid fa-folder"></i> Category</label>
                        <input type="text" id="movieCategory" placeholder="Group movies under this category" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-heading"></i> Title</label>
                        <input type="text" id="movieTitle" placeholder="Movie title" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-align-left"></i> Description</label>
                        <textarea id="movieDesc" placeholder="Movie description" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-brands fa-telegram"></i> Telegram Bot File Link</label>
                        <input type="url" id="movieFileLink" placeholder="https://..." required>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-ad"></i> Advertisement Link</label>
                        <input type="url" id="movieAdLink" placeholder="https://..." required>
                    </div>
                    
                    <!-- NEW SECOND AD LINK INPUT (DISABLED & FIXED) -->
                    <div class="form-group">
                        <label><i class="fa-solid fa-ad"></i> Second Advertisement Link (Fixed)</label>
                        <input type="url" id="movieSecondAdLink" value="www.learny.study" disabled style="opacity: 0.6; cursor: not-allowed;">
                        <small>This link is hardcoded and cannot be changed.</small>
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-image"></i> Thumbnail URL (optional)</label>
                        <input type="url" id="movieThumb" placeholder="https://...">
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">
                        <i class="fa-solid fa-upload"></i> Upload Movie
                    </button>
                </form>
            </div>

            <div class="admin-card">
                <h3><i class="fa-solid fa-list"></i> Categories & Movies</h3>
                <div id="postsList" class="posts-list">
                    <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content share-modal-content">
            <button id="shareModalClose" class="modal-close"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-body">
                <h2 style="text-align:center; margin-bottom:20px;"><i class="fa-solid fa-share-nodes" style="color:var(--accent);"></i> Share</h2>
                <div id="shareOptions" class="share-options"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script type="module" src="admin.js"></script>
</body>
</html>
